# DTO for creating a new event
# Maps to Event\Creator::create() method
dto:
  title:
    type: string
    required: true
    length:
      min: 1
      max: 255

  slug:
    type: string
    required: false
    length:
      max: 255
    pattern: '/^[a-z0-9-]*$/'  # URL-friendly slug

  description:
    type: string
    required: false

  content:
    type: string
    required: true
    default: '{"blocks":[]}'

  location:
    type: string
    required: false
    length:
      max: 255

  start_date:
    type: string
    required: true

  end_date:
    type: string
    required: false

  all_day:
    type: boolean
    required: false
    default: false

  # Recurrence (RFC 5545). The structured fields below are compiled into an
  # RRULE string; alternatively a raw rrule may be supplied directly.
  repeat_freq:
    type: string
    required: false
    enum: ['none', 'daily', 'weekly', 'monthly', 'yearly']
    default: 'none'

  repeat_interval:
    type: integer
    required: false
    default: 1

  repeat_byday:
    type: string
    required: false
    length:
      max: 50

  repeat_end:
    type: string
    required: false
    enum: ['never', 'until', 'count']
    default: 'never'

  repeat_until:
    type: string
    required: false

  repeat_count:
    type: integer
    required: false

  rrule:
    type: string
    required: false
    length:
      max: 500

  category_id:
    type: integer
    required: false

  status:
    type: string
    required: true
    enum: ['draft', 'published']
    default: 'draft'

  featured:
    type: boolean
    required: false
    default: false

  registration_enabled:
    type: boolean
    required: false
    default: false

  registration_visibility:
    type: string
    required: false
    enum: ['public', 'private']
    default: 'public'

  capacity:
    type: integer
    required: false

  featured_image:
    type: string
    required: false

  external_url:
    type: string
    required: false
    length:
      max: 500
    pattern: '/^(https?:\/\/.+)?$/i'  # Optional; must be an http(s) URL when provided

  organizer:
    type: string
    required: false
    length:
      max: 255

  contact_email:
    type: string
    required: false
    length:
      max: 255

  contact_phone:
    type: string
    required: false
    length:
      max: 50

  created_by:
    type: integer
    required: true
